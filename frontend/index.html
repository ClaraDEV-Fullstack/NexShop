    <!-- Open Graph / WhatsApp / LinkedIn / Facebook link preview -->

    <meta property="og:title" content="NEXSHOP — Your Shopping Destination" />

    <meta property="og:image:alt" content="NEXSHOP homepage — Discover Your Perfect Style" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NEXSHOP — Your Shopping Destination" />
    <meta name="twitter:description" content="Browse 40+ products across electronics, fashion, beauty & more. Secure checkout and mobile money payments." />

    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="dns-prefetch" href="https://nexshop-shur.onrender.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
    <title>NEXSHOP</title>
    <style>
      #root:empty {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #fff;
      }
      #root:empty::after {
        content: '';
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid #e5e7eb;
        border-top-color: #4f46e5;
        border-radius: 9999px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>

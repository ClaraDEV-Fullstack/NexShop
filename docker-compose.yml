# docker-compose.yml
name: nexshop

services:
  db:
    image: postgres:16-alpine
    container_name: nexshop_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexshop
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nexshop"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexshop_backend_dev
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...' &&
        sleep 15 &&
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/nexshop
      DEBUG: "True"
      SECRET_KEY: dev-secret-key-not-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      # Supabase Storage — set these in a .env file (never commit real values)
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-media}
      # Google OAuth — set in .env file
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      # CinetPay — set in .env file
      CINETPAY_API_KEY: ${CINETPAY_API_KEY:-}
      CINETPAY_SITE_ID: ${CINETPAY_SITE_ID:-}
      CINETPAY_CURRENCY: ${CINETPAY_CURRENCY:-XOF}
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexshop_frontend_dev
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data_dev:

networks:
  app_network:
    driver: bridge
